services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file: .env.example
    ports: ["8004:8004"]
    depends_on: [postgres, redis]
  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    ports: ["5173:80"]
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: zdash
      POSTGRES_PASSWORD: change-me
      POSTGRES_DB: zdash
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
