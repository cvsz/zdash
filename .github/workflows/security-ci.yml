name: security-ci

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Python audit
        run: |
          cd backend
          pip-audit || true

      - name: NPM audit (non-blocking)
        run: |
          cd frontend
          npm install
          npm audit --audit-level=high || true

      - name: Secret pattern scan
        run: |
          ! rg -n --hidden -g'!.git' -e 'AKIA[0-9A-Z]{16}' -e '-----BEGIN (RSA|EC|OPENSSH) PRIVATE KEY-----' -e 'xox[baprs]-' -e 'sk_live_[0-9a-zA-Z]+' .

      - name: Ensure only example env files tracked
        run: |
          forbidden=$(find . -maxdepth 2 -name '.env*' ! -name '.env.example' ! -name '.env.production.example' | tr '\n' ' ')
          if [ -n "$forbidden" ]; then
            echo "Unexpected env files present: $forbidden"
            exit 1
          fi
